name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Lint informatif tant que la dette lint (@ts-nocheck, any) n'est pas
      # résorbée — visible mais non bloquant.
      - name: Lint (non bloquant)
        run: npm run lint
        continue-on-error: true

      # Type check BLOQUANT (0 erreur attendue).
      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Tests unitaires BLOQUANTS (exclut les worktrees git locaux).
      - name: Unit tests
        run: npx vitest run --exclude "**/.claude/**"

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ATTENTION : le projet Supabase de production est une plateforme multi-apps
  # dont la lignée de migrations DIFFÈRE de ce dépôt. Un `supabase db push`
  # automatique risquerait d'écraser/diverger le schéma partagé. Ce job est donc
  # MANUEL uniquement (workflow_dispatch), jamais déclenché sur push.
  migrate:
    name: Supabase Migrations (manuel)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} -p ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations
        run: supabase db push -p ${{ secrets.SUPABASE_DB_PASSWORD }}
