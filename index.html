<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Atlas F&A - Système de gestion intégré pour l'Afrique avec standards SYSCOHADA" />
    <meta name="keywords" content="ERP, Comptabilité, SYSCOHADA, Gestion, Afrique, Finance" />
    <meta name="author" content="Atlas F&A Team" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self'; frame-src 'self'" />

    <title>Atlas F&A - Système ERP Comptable SYSCOHADA</title>

    <!-- Désinstaller un éventuel service worker obsolète (v1 cassait les chunks).
         Le SW v3 sera ré-enregistré par main.tsx. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) {
            // Demander un update immédiat ; si version obsolète, le SW v3 prendra le relais
            reg.update().catch(function () {});
          });
        }).catch(function () {});
      }
    </script>

    <!-- Polices : Inter (UI premium) + Grand Hotel (brand script) + JetBrains Mono (chiffres) + Instrument Serif (italics éditoriaux) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=Grand+Hotel&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles de base CRITIQUES pour éviter le flash (FOUC) -->
    <style>
      /* Reset basique */
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Police et couleurs de base — Obsidian & Champagne foundation */
      html {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-size: 16px;
        line-height: 1.55;
        letter-spacing: -0.005em;
      }

      body {
        background-color: #F7F4ED;
        color: #0E0E14;
        min-height: 100vh;
        overflow-x: hidden;
      }

      #root {
        min-height: 100vh;
        width: 100%;
      }

      /* Classes Tailwind de base - INLINE pour chargement instantané */
      .min-h-screen { min-height: 100vh; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .text-center { text-align: center; }
      .bg-white { background-color: #ffffff; }
      .rounded-2xl { border-radius: 1rem; }
      .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
      .p-12 { padding: 3rem; }
      .mb-4 { margin-bottom: 1rem; }
      .mb-6 { margin-bottom: 1.5rem; }
      .text-5xl { font-size: 3rem; line-height: 1; }
      .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
      .font-bold { font-weight: 700; }
      .text-gray-800 { color: #1f2937; }
      .text-gray-600 { color: #4b5563; }

      /* Gradients */
      .bg-gradient-to-br {
        background-image: linear-gradient(to bottom right, var(--tw-gradient-stops));
      }
      .from-neutral-100 { --tw-gradient-from: #f5f5f5; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(245, 245, 245, 0)); }
      .to-neutral-200 { --tw-gradient-to: #e5e5e5; }

      /* Loading spinner — premium gold */
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 2px solid rgba(201, 169, 97, 0.20);
        border-top: 2px solid #C9A961;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Masquer le contenu initial jusqu'au chargement */
      #root:empty::after {
        content: '';
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, #F7F4ED 0%, #FFFFFF 100%);
        z-index: 9999;
      }

      /* Overlay de chargement initial */
      .app-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, #F7F4ED 0%, #FFFFFF 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.3s ease-out;
      }

      .app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Loader supprimé - React gère le chargement -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
